name: Keep Career Canvas Supabase alive

on:
  schedule:
    - cron: '0 8 * * 1,3,5'  # Mon, Wed, Fri at 8am UTC
  workflow_dispatch:           # allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping via Vercel
        run: |
          curl -f https://penn-tools.vercel.app/tools/8/ping
